<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Icon Generator — You Mean LLMs</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f5f5f5; }
    canvas { display: block; margin: 0.5rem 0; image-rendering: pixelated; }
    button { margin: 1rem 0.5rem 0 0; padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
    .previews { display: flex; gap: 2rem; align-items: flex-end; margin-bottom: 1rem; }
    .preview { text-align: center; font-size: 0.8rem; color: #555; }
  </style>
</head>
<body>
  <h2>You Mean LLMs — Icon Generator</h2>
  <p>Click the button to download all three icon sizes into your <code>icons/</code> folder.</p>

  <div class="previews">
    <div class="preview"><canvas id="c128" width="128" height="128"></canvas>128×128</div>
    <div class="preview"><canvas id="c48" width="48" height="48"></canvas>48×48</div>
    <div class="preview"><canvas id="c16" width="16" height="16"></canvas>16×16</div>
  </div>

  <button onclick="downloadAll()">Download all icons</button>

  <script>
    function drawIcon(canvas) {
      const size = canvas.width;
      const ctx = canvas.getContext("2d");

      // Background
      ctx.fillStyle = "#F0F0F0";
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, size * 0.15);
      ctx.fill();

      // Strikethrough diagonal line
      ctx.strokeStyle = "#CC2200";
      ctx.lineWidth = size * 0.1;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(size * 0.15, size * 0.85);
      ctx.lineTo(size * 0.85, size * 0.15);
      ctx.stroke();

      // Brain emoji (no fillStyle needed — emoji render in color natively)
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `${Math.round(size * 0.55)}px serif`;
      ctx.fillText("🧠", size / 2, size / 2 + size * 0.04);
    }

    function downloadCanvas(canvas, filename) {
      const link = document.createElement("a");
      link.download = filename;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function downloadAll() {
      downloadCanvas(document.getElementById("c128"), "icon128.png");
      downloadCanvas(document.getElementById("c48"), "icon48.png");
      downloadCanvas(document.getElementById("c16"), "icon16.png");
    }

    // Render previews on load
    ["c128", "c48", "c16"].forEach(id => drawIcon(document.getElementById(id)));
  </script>
</body>
</html>
